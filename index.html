<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaksi & Ketenangan ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            /* Latar Belakang Gambar Milky Way Full HD dari Unsplash */
            background: url('https://images.unsplash.com/photo-1464802686167-b939a6910659?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
            overflow: hidden;
        }
        
        /* Efek overlay gelap agar teks lebih mudah dibaca */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* Kotak Teks bergaya Kaca (Glassmorphism) */
        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        p {
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 30px;
        }

        /* Tombol Elegan Minimalis */
        .btn-estetik {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 12px 30px;
            font-size: 1rem;
            letter-spacing: 1px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.4s ease;
            outline: none;
        }

        .btn-estetik:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Lapisan gelap transparan -->
    <div class="overlay"></div>

    <!-- Kotak Konten -->
    <div class="glass-card">
        <h1>Keabadian</h1>
        <p>Ambil waktu sejenak. Tarik napas, tenangkan pikiran, dan nikmati keindahan semesta selama 15 detik.</p>
        
        <!-- Tombol Trigger -->
        <button class="btn-estetik" id="tombolPlay">✦ Putar Alunan</button>
    </div>

    <!-- AUDIO PLAYER (Instrumental Syahdu/Indah) -->
    <audio id="laguBackground">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('laguBackground');
        const tombol = document.getElementById('tombolPlay');
        let timer; 

        tombol.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                tombol.innerHTML = "✦ Menikmati Semesta...";
                tombol.style.background = "rgba(255, 255, 255, 0.15)";
                tombol.style.borderColor = "#fff";

                // Otomatis berhenti setelah 15 detik (15000 ms)
                clearTimeout(timer);
                timer = setTimeout(() => {
                    audio.pause();
                    audio.currentTime = 0; 
                    tombol.innerHTML = "✦ Putar Kembali";
                    tombol.style.background = "transparent";
                    tombol.style.borderColor = "rgba(255, 255, 255, 0.6)";
                }, 15000); 
                
            } else {
                audio.pause();
                audio.currentTime = 0;
                clearTimeout(timer);
                tombol.innerHTML = "✦ Putar Alunan";
                tombol.style.background = "transparent";
                tombol.style.borderColor = "rgba(255, 255, 255, 0.6)";
            }
        });
    </script>
</body>
</html>
