<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nethalina - Space & Serenity</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&family=Noto+Serif+KR:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        /* Reset & Dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
        }

        /* Latar Belakang Luar Angkasa (Resolusi 4K) */
        .space-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Ganti URL ini dengan gambar 4K pilihanmu jika ingin gambar spesifik */
            background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=3840&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: 1;
            /* Efek zoom lambat yang elegan */
            animation: slowZoom 40s linear infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* Overlay gelap agar teks lebih mudah dibaca dan tidak norak */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
        }

        /* Konten Utama */
        .content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            user-select: none;
        }

        /* Elemen Korea */
        .korean-text {
            font-family: 'Noto Serif KR', serif;
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: 15px;
            margin-bottom: 20px;
            color: #e0e0e0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            opacity: 0;
            animation: fadeIn 3s ease-in-out 1s forwards;
        }

        .subtitle {
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #aaaaaa;
            opacity: 0;
            animation: fadeIn 3s ease-in-out 2s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tanda Tangan / Watermark di Kanan Bawah */
        .nethalina-signature {
            position: absolute;
            bottom: 30px;
            right: 40px;
            z-index: 4;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 200;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s ease, opacity 0.3s ease;
            cursor: default;
        }

        .nethalina-signature:hover {
            color: rgba(255, 255, 255, 1);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Kontrol Musik Elegan */
        .music-control {
            position: absolute;
            bottom: 30px;
            left: 40px;
            z-index: 4;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            transition: color 0.3s ease;
        }

        .music-control:hover {
            color: white;
        }

        .music-icon {
            margin-right: 10px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            position: relative;
            animation: pulse 2s infinite;
            display: none; /* Muncul saat lagu diputar */
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="space-background"></div>
    <div class="overlay"></div>

    <div class="content">
        <div class="korean-text">우주의 속삭임</div>
        <div class="subtitle">Whispers of the universe</div>
    </div>

    <div class="music-control" id="playBtn">
        <div class="music-icon" id="musicIcon"></div>
        <span id="musicText">PLAY MUSIC</span>
    </div>

    <div class="nethalina-signature">
        nethalina
    </div>

    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf7eb.mp3?filename=deep-space-110845.mp3" type="audio/mpeg">
        Browser Anda tidak mendukung elemen audio.
    </audio>

    <script>
        const playBtn = document.getElementById('playBtn');
        const bgMusic = document.getElementById('bgMusic');
        const musicText = document.getElementById('musicText');
        const musicIcon = document.getElementById('musicIcon');
        let isPlaying = false;

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                musicText.innerText = "PLAY MUSIC";
                musicIcon.style.display = "none";
            } else {
                // Memainkan musik dengan volume yang sangat pelan dan elegan (30%)
                bgMusic.volume = 0.3; 
                bgMusic.play();
                musicText.innerText = "PAUSE MUSIC";
                musicIcon.style.display = "block";
            }
            isPlaying = !isPlaying;
        });
    </script>
</body>
</html>
